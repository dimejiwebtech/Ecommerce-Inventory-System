{% if messages %}
<div id="toast-container"
     class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 max-w-sm"
     x-data
     x-init="setTimeout(() => $el.remove(), 5000)">
    {% for message in messages %}
    <div x-data="{ show: true }"
         x-show="show"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         x-init="setTimeout(() => show = false, 4500)"
         class="flex items-start gap-3 px-5 py-4 shadow-lg rounded-sm border text-sm
         {% if message.tags == 'error' %}bg-red-50 border-red-200 text-red-700
         {% elif message.tags == 'success' %}bg-green-50 border-green-200 text-green-700
         {% elif message.tags == 'warning' %}bg-yellow-50 border-yellow-200 text-yellow-700
         {% else %}bg-white border-shop-border text-shop-text{% endif %}">
        <i class="mt-0.5 fas
            {% if message.tags == 'error' %}fa-times-circle text-red-400
            {% elif message.tags == 'success' %}fa-check-circle text-green-500
            {% elif message.tags == 'warning' %}fa-exclamation-triangle text-yellow-500
            {% else %}fa-info-circle text-shop-gold{% endif %}"></i>
        <p class="flex-1">{{ message }}</p>
        <button @click="show = false" class="opacity-50 hover:opacity-100 transition">
            <i class="fas fa-times text-xs"></i>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
