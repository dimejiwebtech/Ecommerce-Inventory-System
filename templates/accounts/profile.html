{% extends 'base.html' %}

{% block title %}Account Settings | AURA{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="flex flex-col md:flex-row gap-10">
        <!-- Sidebar -->
        {% include 'accounts/partials/dashboard_sidebar.html' %}

        <div class="flex-1 min-w-0 max-w-2xl">
            <h1 class="font-serif text-2xl text-shop-text mb-8">Account Settings</h1>
            
            <form action="{% url 'accounts:profile' %}" method="POST" enctype="multipart/form-data" class="space-y-8 bg-white p-8 border border-shop-border">
                {% csrf_token %}
                
                <div>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-shop-muted mb-6 pb-2 border-b border-shop-border">Personal Details</h3>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs text-shop-muted mb-1 uppercase tracking-tighter font-bold">First Name</label>
                            <input type="text" name="first_name" value="{{ user.first_name }}" 
                                   class="w-full border border-shop-border px-4 py-3 text-sm focus:outline-none focus:border-shop-gold bg-white">
                        </div>
                        <div>
                            <label class="block text-xs text-shop-muted mb-1 uppercase tracking-tighter font-bold">Last Name</label>
                            <input type="text" name="last_name" value="{{ user.last_name }}" 
                                   class="w-full border border-shop-border px-4 py-3 text-sm focus:outline-none focus:border-shop-gold bg-white">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-shop-muted mb-1 uppercase tracking-tighter font-bold">Phone Number</label>
                        <input type="tel" name="phone" value="{{ user.phone|default:'' }}" 
                               class="w-full border border-shop-border px-4 py-3 text-sm focus:outline-none focus:border-shop-gold bg-white">
                    </div>
                </div>

                <div>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-shop-muted mb-6 pb-2 border-b border-shop-border">Location</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-shop-muted mb-1 uppercase tracking-tighter font-bold">Address</label>
                            <textarea name="address" rows="2"
                                      class="w-full border border-shop-border px-4 py-3 text-sm focus:outline-none focus:border-shop-gold bg-white">{{ user.profile.address|default:'' }}</textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-shop-muted mb-1 uppercase tracking-tighter font-bold">City</label>
                                <input type="text" name="city" value="{{ user.profile.city|default:'' }}" 
                                       class="w-full border border-shop-border px-4 py-3 text-sm focus:outline-none focus:border-shop-gold bg-white">
                            </div>
                            <div>
                                <label class="block text-xs text-shop-muted mb-1 uppercase tracking-tighter font-bold">State</label>
                                <input type="text" name="state" value="{{ user.profile.state|default:'' }}" 
                                       class="w-full border border-shop-border px-4 py-3 text-sm focus:outline-none focus:border-shop-gold bg-white">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" 
                            class="bg-shop-text hover:bg-shop-gold text-white px-8 py-3.5 text-xs font-bold uppercase tracking-widest transition">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
