{% extends 'base.html' %}
{% block title %}Link Expired | AURA{% endblock %}
{% block content %}
<div class="min-h-screen bg-shop-bg flex items-center justify-center py-16 px-4">
    <div class="w-full max-w-md bg-white border border-shop-border p-8 sm:p-10 text-center">
        <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-exclamation-circle text-red-400 text-2xl"></i>
        </div>
        <h1 class="font-serif text-3xl text-shop-text mb-3">Link Expired</h1>
        <p class="text-shop-muted text-sm mb-6">Your verification link has expired (24h limit).<br>Request a new one below.</p>
        <form method="post" action="{% url 'resend_verification' %}">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ user.email }}">
            <button type="submit"
                    class="w-full bg-shop-text hover:bg-shop-gold text-white py-3 font-medium transition text-sm">
                Send New Verification Link
            </button>
        </form>
    </div>
</div>
{% endblock %}
