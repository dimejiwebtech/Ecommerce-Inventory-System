{% extends 'ims/base.html' %}

{% block title %}Point of Sale | AURA IMS{% endblock %}

{% block content %}
<div x-data="posSystem()" class="h-[calc(100vh-120px)] flex flex-col lg:flex-row gap-6">
    
    <!-- Left: Product Selection -->
    <div class="lg:w-2/3 flex flex-col h-full bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="p-4 border-b border-slate-50 bg-slate-50/50">
            <div class="relative group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-[var(--ims-accent)] transition-colors"></i>
                <input 
                    type="text" 
                    x-model="searchQuery" 
                    @input.debounce.300ms="searchProducts()"
                    placeholder="Search by SKU or Product Name..." 
                    class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-[var(--ims-accent)] shadow-sm bg-white"
                >
            </div>
        </div>

        <!-- Search Results -->
        <div class="flex-1 overflow-y-auto p-4">
            <template x-if="loading">
                <div class="flex justify-center py-10">
                    <i class="fas fa-circle-notch fa-spin text-3xl text-slate-200"></i>
                </div>
            </template>

            <template x-if="!loading && searchResults.length === 0">
                <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                    <i class="fas fa-search text-5xl mb-4 opacity-10"></i>
                    <p class="text-sm font-medium">No products found. Start typing to search.</p>
                </div>
            </template>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <template x-for="item in searchResults" :key="item.variant_id || item.id">
                    <div 
                        @click="addToCart(item)"
                        class="p-4 border border-slate-100 rounded-xl hover:border-[var(--ims-accent)] hover:shadow-md transition cursor-pointer group relative overflow-hidden"
                    >
                        <div class="absolute top-0 right-0 p-2 opacity-0 group-hover:opacity-100 transition">
                            <i class="fas fa-plus-circle text-[var(--ims-accent)] text-xl"></i>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1" x-text="item.category"></p>
                        <h4 class="font-bold text-slate-800 text-sm mb-1" x-text="item.name"></h4>
                        <p class="text-[10px] text-slate-400 font-medium mb-3">SKU: <span x-text="item.sku"></span></p>
                        <div class="flex items-center justify-between">
                            <span class="text-lg font-black text-slate-800">₦<span x-text="formatNumber(item.price)"></span></span>
                            <span :class="item.stock <= 5 ? 'text-rose-500 bg-rose-50' : 'text-emerald-500 bg-emerald-50'" class="px-2 py-0.5 rounded text-[10px] font-bold" x-text="item.stock + ' in stock'"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Right: Cart & Checkout -->
    <div class="lg:w-1/3 flex flex-col h-full bg-slate-900 rounded-xl shadow-2xl overflow-hidden text-white">
        <!-- Cart Header -->
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <h3 class="font-bold text-lg flex items-center gap-3">
                <i class="fas fa-shopping-basket text-[var(--ims-accent)]"></i>
                Current Order
            </h3>
            <button @click="clearCart()" class="text-[10px] font-bold uppercase tracking-widest text-white/30 hover:text-rose-400 transition">Clear All</button>
        </div>

        <!-- Cart Items -->
        <div class="flex-1 overflow-y-auto p-4 space-y-3">
            <template x-if="cart.length === 0">
                <div class="h-full flex flex-col items-center justify-center text-white/20">
                    <i class="fas fa-cart-arrow-down text-6xl mb-4 opacity-5"></i>
                    <p class="text-xs font-bold uppercase tracking-widest">Cart is empty</p>
                </div>
            </template>

            <template x-for="(item, index) in cart" :key="index">
                <div class="bg-white/5 p-4 rounded-xl border border-white/5 group">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1 pr-4">
                            <h5 class="font-bold text-sm leading-tight" x-text="item.name"></h5>
                            <p class="text-[10px] text-white/40 mt-1">₦<span x-text="formatNumber(item.price)"></span> each</p>
                        </div>
                        <button @click="removeFromCart(index)" class="text-white/20 hover:text-rose-500 transition">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3 bg-black/20 rounded-lg p-1">
                            <button @click="updateQty(index, -1)" class="w-8 h-8 rounded-md bg-white/5 hover:bg-white/10 flex items-center justify-center transition">-</button>
                            <span class="w-6 text-center text-sm font-bold" x-text="item.quantity"></span>
                            <button @click="updateQty(index, 1)" class="w-8 h-8 rounded-md bg-white/5 hover:bg-white/10 flex items-center justify-center transition">+</button>
                        </div>
                        <span class="font-black text-sm text-[var(--ims-accent)]">₦<span x-text="formatNumber(item.price * item.quantity)"></span></span>
                    </div>
                </div>
            </template>
        </div>

        <!-- Checkout Section -->
        <div class="p-6 bg-black/40 border-t border-white/10 space-y-4">
            <!-- Payment & Customer -->
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-2">Payment Method</label>
                    <div class="grid grid-cols-3 gap-2">
                        <template x-for="method in ['cash', 'pos', 'transfer']">
                            <button 
                                @click="paymentMethod = method"
                                :class="paymentMethod === method ? 'bg-[var(--ims-accent)] text-white shadow-[0_0_15px_rgba(40,167,69,0.3)]' : 'bg-white/5 text-white/60 hover:bg-white/10'"
                                class="py-2.5 rounded-lg text-[10px] font-black uppercase tracking-tighter transition border border-white/5"
                                x-text="method"
                            ></button>
                        </template>
                    </div>
                </div>
                
                <div class="col-span-2 space-y-3">
                    <input x-model="customerName" type="text" placeholder="Customer Name (Optional)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 text-xs focus:outline-none focus:border-[var(--ims-accent)]">
                </div>
            </div>

            <!-- Totals -->
            <div class="pt-4 space-y-2 border-t border-white/5">
                <div class="flex justify-between text-xs text-white/40">
                    <span>Subtotal</span>
                    <span>₦<span x-text="formatNumber(cartTotal)"></span></span>
                </div>
                <div class="flex justify-between items-end pt-2">
                    <span class="text-sm font-bold uppercase tracking-widest text-white/60">Total</span>
                    <span class="text-2xl font-black text-white">₦<span x-text="formatNumber(cartTotal)"></span></span>
                </div>
            </div>

            <button 
                @click="checkout()"
                :disabled="cart.length === 0 || processing"
                class="w-full bg-[var(--ims-accent)] hover:opacity-90 disabled:opacity-20 disabled:cursor-not-allowed text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest transition shadow-lg flex items-center justify-center gap-3"
            >
                <i x-show="!processing" class="fas fa-check-double"></i>
                <i x-show="processing" class="fas fa-circle-notch fa-spin"></i>
                <span x-text="processing ? 'Processing...' : 'Complete Sale'"></span>
            </button>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div x-show="showReceipt" class="fixed inset-0 z-50 flex items-center justify-center px-4 bg-slate-900/90 backdrop-blur-sm" x-cloak>
        <div class="bg-white text-slate-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-receipt-up">
            <div class="p-8 text-center border-b border-slate-100">
                <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fas fa-check"></i>
                </div>
                <h3 class="text-xl font-black uppercase tracking-tight">Sale Completed!</h3>
                <p class="text-slate-400 text-sm mt-1">Transaction #<span x-text="lastSaleId"></span></p>
            </div>
            
            <div class="p-8 space-y-6">
                <div class="flex justify-between text-sm">
                    <span class="font-bold text-slate-400">Total Paid</span>
                    <span class="font-black text-lg">₦<span x-text="formatNumber(cartTotal)"></span></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="font-bold text-slate-400">Payment</span>
                    <span class="text-slate-800 font-bold uppercase" x-text="paymentMethod"></span>
                </div>
                
                <div class="pt-6 flex gap-4">
                    <button @click="window.location.reload()" class="flex-1 border border-slate-200 py-3 rounded-lg font-bold text-xs uppercase tracking-widest hover:bg-slate-50 transition">New Sale</button>
                    <button @click="printReceipt()" class="flex-1 bg-slate-800 text-white py-3 rounded-lg font-bold text-xs uppercase tracking-widest hover:opacity-90 transition">Print Receipt</button>
                </div>
            </div>
        </div>
    </div>

</div>

<style>
    [x-cloak] { display: none !important; }
    @keyframes receipt-up {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-receipt-up { animation: receipt-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
</style>

<script>
function posSystem() {
    return {
        searchQuery: '',
        loading: false,
        searchResults: [],
        cart: [],
        paymentMethod: 'cash',
        customerName: '',
        customerPhone: '',
        processing: false,
        showReceipt: false,
        lastSaleId: null,

        async searchProducts() {
            if (this.searchQuery.length < 2) {
                this.searchResults = [];
                return;
            }
            this.loading = true;
            try {
                const response = await fetch(`{% url 'pos:ims_pos_search' %}?q=${encodeURIComponent(this.searchQuery)}`);
                const data = await response.json();
                this.searchResults = data.results;
            } catch (error) {
                console.error('Search failed:', error);
            } finally {
                this.loading = false;
            }
        },

        addToCart(product) {
            const existing = this.cart.find(item => 
                item.id === product.id && item.variant_id === product.variant_id
            );
            
            if (existing) {
                if (existing.quantity < product.stock) {
                    existing.quantity++;
                } else {
                    alert('Insufficient stock!');
                }
            } else {
                if (product.stock > 0) {
                    this.cart.push({ ...product, quantity: 1 });
                } else {
                    alert('Out of stock!');
                }
            }
            // Optional: reset search after adding?
            // this.searchQuery = '';
            // this.searchResults = [];
        },

        removeFromCart(index) {
            this.cart.splice(index, 1);
        },

        updateQty(index, delta) {
            const item = this.cart[index];
            const newQty = item.quantity + delta;
            if (newQty > 0 && newQty <= item.stock) {
                item.quantity = newQty;
            }
        },

        get cartTotal() {
            return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        },

        clearCart() {
            if (confirm('Clear entire cart?')) {
                this.cart = [];
            }
        },

        async checkout() {
            if (this.cart.length === 0) return;
            this.processing = true;
            
            try {
                const response = await fetch(`{% url 'pos:ims_pos_checkout' %}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        items: this.cart,
                        payment_method: this.paymentMethod,
                        total: this.cartTotal,
                        customer_name: this.customerName,
                        customer_phone: this.customerPhone
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    this.lastSaleId = data.sale_id;
                    this.showReceipt = true;
                } else {
                    alert('Checkout failed: ' + data.message);
                }
            } catch (error) {
                console.error('Checkout error:', error);
                alert('An error occurred. Please try again.');
            } finally {
                this.processing = false;
            }
        },

        formatNumber(n) {
            return parseFloat(n).toLocaleString('en-NG', { minimumFractionDigits: 2 });
        },

        printReceipt() {
            window.print();
        }
    }
}
</script>
{% endblock %}
