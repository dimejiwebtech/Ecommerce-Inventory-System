{% extends 'ims/base.html' %}

{% block title %}{{ title }} | AURA IMS{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12">
    <div class="bg-white p-8 md:p-12 rounded-2xl border border-slate-100 shadow-xl text-center">
        <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-6">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        
        <h1 class="text-2xl font-bold text-slate-800 mb-2">{{ title }}</h1>
        <p class="text-slate-500 mb-8 leading-relaxed">
            Are you sure you want to delete <span class="font-bold text-slate-700">"{{ object }}"</span>? 
            <br>This action is permanent and cannot be undone.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <form method="post" class="w-full sm:w-auto">
                {% csrf_token %}
                <button type="submit" class="w-full sm:w-48 bg-rose-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-rose-700 transition shadow-lg shadow-rose-100 uppercase tracking-widest">
                    Confirm Delete
                </button>
            </form>
            <a href="{% if back_url %}{% url back_url %}{% else %}javascript:history.back(){% endif %}" class="w-full sm:w-48 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-sm hover:bg-slate-200 transition uppercase tracking-widest">
                Cancel
            </a>
        </div>
    </div>
</div>
{% endblock %}
