{% extends 'ims/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-6 flex items-center gap-4">
        <a href="/ims/catalogue/collections" class="text-gray-400 hover:text-ims-bodyText"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-2xl font-bold text-ims-bodyText">Create Collection</h1>
    </div>

    <form class="space-y-6">
        <div class="bg-ims-pageBg border border-gray-200 rounded-lg shadow-sm p-6">
            <h2 class="text-lg font-bold text-ims-bodyText mb-4 border-b border-gray-100 pb-2">Collection Details</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Collection Name</label>
                    <input type="text" placeholder="e.g., Summer Bridal 2026" required class="w-full border border-gray-300 rounded px-4 py-2 focus:ring-1 focus:ring-ims-accent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea rows="3" class="w-full border border-gray-300 rounded px-4 py-2 focus:ring-1 focus:ring-ims-accent outline-none"></textarea>
                </div>
            </div>
        </div>

        <div class="bg-ims-pageBg border border-gray-200 rounded-lg shadow-sm p-6">
            <h2 class="text-lg font-bold text-ims-bodyText mb-4 border-b border-gray-100 pb-2">Banner Image</h2>
            <p class="text-xs text-gray-500 mb-4">This image will be displayed at the top of the collection page on the shop.</p>
            
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center hover:bg-gray-50 transition cursor-pointer">
                <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
                <p class="text-sm font-medium text-ims-bodyText">Click to upload or drag and drop</p>
                <p class="text-xs text-gray-500 mt-1">SVG, PNG, JPG or GIF (MAX. 1920x1080px)</p>
            </div>
        </div>

        <div class="flex justify-end gap-4">
            <button type="button" class="px-6 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50 font-medium transition">Cancel</button>
            <button type="submit" class="px-6 py-2 bg-ims-accent hover:bg-green-600 text-white rounded font-medium transition shadow-sm">Save Collection</button>
        </div>
    </form>
</div>
{% endblock %}
